databaseChangeLog:
  - changeSet:
      id: 001-1-create-users-table
      author: maxim vorobev
      changes:
        - createTable:
            tableName: users
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false

              - column:
                  name: username
                  type: VARCHAR(50)
                  constraints:
                    unique: true
                    nullable: false

              - column:
                  name: password
                  type: VARCHAR(255)
                  constraints:
                    nullable: false

              - column:
                  name: role
                  type: VARCHAR(20)
                  defaultValue: USER
                  constraints:
                    nullable: false

  - changeSet:
      id: 001-2-create-cards-table
      author: maxim vorobev
      changes:
        - createTable:
            tableName: cards
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false

              # Номер карты зашифрованный
              - column:
                  name: card_number_encrypted
                  type: VARCHAR(255)
                  constraints:
                    nullable: false

              # Последние 4 цифры для маски (**** **** **** 1234)
              - column:
                  name: card_number_last_four
                  type: VARCHAR(4)
                  constraints:
                    nullable: false

              # Владелец
              - column:
                  name: holder_name
                  type: VARCHAR(100)
                  constraints:
                    nullable: false

              # Срок действия
              - column:
                  name: expiry_date
                  type: TIMESTAMP
                  constraints:
                    nullable: false

              # Статус: Активна, Заблокирована, истек срок
              - column:
                  name: status
                  type: VARCHAR(20)
                  defaultValue: ACTIVE
                  constraints:
                    nullable: false

              # Баланс
              - column:
                  name: balance
                  type: DECIMAL(19,2)
                  defaultValue: 0.00
                  constraints:
                    nullable: false

              # Связь с пользователем
              - column:
                  name: user_id
                  type: BIGINT
                  constraints:
                    nullable: false

        - addForeignKeyConstraint:
            baseTableName: cards
            baseColumnNames: user_id
            referencedTableName: users
            referencedColumnNames: id
            constraintName: fk_cards_user
            onDelete: CASCADE

  - changeSet:
      id: 001-3-create-transactions-table
      author: maxim vorobev
      changes:
        - createTable:
            tableName: transactions
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false

              # Переводы между своими картами
              - column:
                  name: from_card_id
                  type: BIGINT
                  constraints:
                    nullable: false


              - column:
                  name: to_card_id
                  type: BIGINT
                  constraints:
                    nullable: false


              - column:
                  name: amount
                  type: DECIMAL(19,2)
                  constraints:
                    nullable: false

              - column:
                  name: created_at
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP

        - addForeignKeyConstraint:
            baseTableName: transactions
            baseColumnNames: from_card_id
            referencedTableName: cards
            referencedColumnNames: id
            constraintName: fk_transactions_from_card
            onDelete: RESTRICT

        - addForeignKeyConstraint:
            baseTableName: transactions
            baseColumnNames: to_card_id
            referencedTableName: cards
            referencedColumnNames: id
            constraintName: fk_transactions_to_card
            onDelete: RESTRICT

        # Индекс для быстрого поиска транзакций по картам
        - createIndex:
            tableName: transactions
            indexName: idx_transactions_cards
            columns:
              - column:
                  name: from_card_id
              - column:
                  name: to_card_id